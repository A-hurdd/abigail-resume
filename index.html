<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abigail H.</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0c1018;--bg-deep:#080b11;--bg-card:#111720;--bg-card-hover:#161d28;
  --green:#3ddc84;--green-dim:rgba(61,220,132,0.08);--green-mid:rgba(61,220,132,0.20);
  --green-glow:rgba(61,220,132,0.35);--green-faint:rgba(61,220,132,0.04);
  --text:#b0bac8;--text-bright:#dce3ec;--text-dim:#546178;--text-mid:#8494a7;
  --border:rgba(61,220,132,0.07);--mono:'DM Mono',monospace;--sans:'Outfit',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--bg-deep);color:var(--text);font-family:var(--sans);font-size:16px;line-height:1.65;-webkit-font-smoothing:antialiased;overflow-x:hidden}

.radar-wrap{position:fixed;top:0;right:0;width:760px;height:760px;pointer-events:none;z-index:0;opacity:0.68;transform:translate3d(0,0,0);transition:transform 0.6s ease;filter:drop-shadow(0 0 28px rgba(61,220,132,0.08))}
.radar-wrap::before{content:'';position:absolute;inset:52px;border-radius:50%;background:radial-gradient(circle,rgba(61,220,132,0.08) 0%,rgba(61,220,132,0.035) 32%,rgba(8,11,17,0) 74%)}
.radar-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)}
.radar-grid{position:absolute;inset:0;border-radius:50%;background:radial-gradient(circle at center,rgba(61,220,132,0.04) 0 2px,transparent 2px 100%),repeating-radial-gradient(circle at center,rgba(61,220,132,0.04) 0 1px,transparent 1px 74px),linear-gradient(0deg,transparent 49.7%,rgba(61,220,132,0.04) 49.85%,rgba(61,220,132,0.04) 50.15%,transparent 50.3%),linear-gradient(90deg,transparent 49.7%,rgba(61,220,132,0.04) 49.85%,rgba(61,220,132,0.04) 50.15%,transparent 50.3%);opacity:0.55}
.radar-ring{position:absolute;top:50%;left:50%;border-radius:50%;border:1px solid rgba(61,220,132,0.06);transform:translate(-50%,-50%)}
.ring-1{width:150px;height:150px}
.ring-2{width:300px;height:300px}
.ring-3{width:450px;height:450px}
.ring-4{width:600px;height:600px;border-color:rgba(61,220,132,0.08)}
.ring-5{width:720px;height:720px;border-color:rgba(61,220,132,0.05)}
.radar-cross{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)}
.radar-cross::before,.radar-cross::after{content:'';position:absolute;background:rgba(61,220,132,0.04)}
.radar-cross::before{width:720px;height:1px;top:0;left:-360px}
.radar-cross::after{width:1px;height:720px;top:-360px;left:0}
.radar-diag{position:absolute;top:50%;left:50%;width:510px;height:1px;background:rgba(61,220,132,0.03);transform-origin:left center}
.diag-1{transform:translate(-255px,-255px) rotate(45deg)}
.diag-2{transform:translate(-255px,255px) rotate(-45deg)}
.radar-sweep{position:absolute;top:50%;left:50%;width:360px;height:2px;background:linear-gradient(90deg,rgba(61,220,132,0.95),rgba(61,220,132,0.45),transparent 78%);transform-origin:left center;animation:sweep 11s linear infinite;filter:drop-shadow(0 0 10px rgba(61,220,132,0.24))}
.radar-sweep::before{content:'';position:absolute;top:-180px;left:0;width:360px;height:360px;background:conic-gradient(from 0deg,rgba(61,220,132,0.26),rgba(61,220,132,0.10) 14deg,rgba(61,220,132,0.02) 28deg,transparent 44deg);transform-origin:0 180px;border-radius:0 360px 0 0;clip-path:polygon(0 50%,100% 0,100% 50%)}
.radar-sweep::after{content:'';position:absolute;top:50%;right:-4px;width:10px;height:10px;border-radius:50%;background:rgba(61,220,132,0.95);transform:translateY(-50%);box-shadow:0 0 16px rgba(61,220,132,0.55)}
@keyframes sweep{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.radar-dot{position:absolute;top:50%;left:50%;width:6px;height:6px;background:var(--green);border-radius:50%;box-shadow:0 0 6px var(--green-glow);opacity:calc(0.08 + var(--signal,0) * 0.92);transform:translate(-50%,-50%) scale(calc(0.75 + var(--signal,0) * 0.35));transition:opacity 0.16s linear,transform 0.16s linear,box-shadow 0.16s linear}
.radar-dot::after{content:'';position:absolute;inset:-5px;border-radius:50%;border:1px solid rgba(61,220,132,0.18);opacity:calc(var(--signal,0) * 0.85)}
.dot-1{margin-top:-80px;margin-left:60px}
.dot-2{margin-top:40px;margin-left:-120px}
.dot-3{margin-top:-150px;margin-left:-80px;width:4px;height:4px}
.dot-4{margin-top:100px;margin-left:140px;width:5px;height:5px}
.dot-5{margin-top:-30px;margin-left:200px;width:4px;height:4px}
.radar-label{position:absolute;top:50%;left:50%;font-family:var(--mono);font-size:9px;color:rgba(61,220,132,0.12);pointer-events:none;opacity:0.2}
.label-1{margin-top:2px;margin-left:78px}.label-2{margin-top:2px;margin-left:153px}.label-3{margin-top:2px;margin-left:228px}.label-4{margin-top:2px;margin-left:305px}
.radar-route{position:absolute;inset:0;opacity:0.4}
.radar-route path{fill:none;stroke:rgba(61,220,132,0.14);stroke-width:1.2;stroke-dasharray:5 10}
.flight-layer{position:absolute;inset:0}
.flight{position:absolute;top:50%;left:50%;width:12px;height:12px;margin:-6px;transform-origin:center;--signal:0;--heading:0deg}
.flight-point{position:absolute;top:50%;left:50%;width:8px;height:8px;margin:-4px;border-radius:50%;background:rgba(61,220,132,0.98);box-shadow:0 0 calc(8px + var(--signal,0) * 10px) rgba(61,220,132,0.55);opacity:calc(0.22 + var(--signal,0) * 0.9);transition:opacity 0.16s linear,box-shadow 0.16s linear,transform 0.16s linear}
.flight-point::before{content:'';position:absolute;top:50%;left:50%;width:18px;height:2px;background:linear-gradient(90deg,rgba(61,220,132,0.9),transparent);transform-origin:2px 50%;transform:translateY(-50%) rotate(var(--heading));opacity:calc(0.25 + var(--signal,0) * 0.85)}
.flight::after{content:'';position:absolute;top:50%;left:50%;width:1px;height:34px;background:linear-gradient(to top,rgba(61,220,132,0.28),transparent);transform:translate(-50%,-100%) rotate(var(--heading));transform-origin:center bottom;opacity:calc(0.15 + var(--signal,0) * 0.5)}
.flight-label{position:absolute;top:50%;left:50%;margin-left:14px;margin-top:-18px;padding:4px 7px;border:1px solid rgba(61,220,132,0.14);background:rgba(8,11,17,0.78);font-family:var(--mono);font-size:8px;letter-spacing:1.4px;text-transform:uppercase;color:rgba(220,227,236,0.85);white-space:nowrap;opacity:calc(0.18 + var(--signal,0) * 0.95);transform:translateY(calc((1 - var(--signal,0)) * 2px));transition:opacity 0.16s linear,transform 0.16s linear,border-color 0.16s linear,box-shadow 0.16s linear;box-shadow:0 0 calc(var(--signal,0) * 18px) rgba(61,220,132,0.16)}
.flight-track{position:absolute;top:50%;left:50%;height:1px;border-top:1px dashed rgba(61,220,132,0.18);transform-origin:left center;opacity:0.45}
.track-1{width:180px;transform:translate(-210px,-80px) rotate(-26deg)}
.track-2{width:210px;transform:translate(-120px,180px) rotate(-60deg)}
.track-3{width:165px;transform:translate(170px,100px) rotate(148deg)}
.flight-1{animation:orbit-one 30s linear infinite}
.flight-2{animation:orbit-two 38s linear infinite}
.flight-3{animation:orbit-three 34s linear infinite}
@keyframes orbit-one{0%{transform:translate(-210px,-80px)}25%{transform:translate(-40px,-200px)}50%{transform:translate(170px,-100px)}75%{transform:translate(110px,120px)}100%{transform:translate(-210px,-80px)}}
@keyframes orbit-two{0%{transform:translate(-120px,180px)}25%{transform:translate(-200px,10px)}50%{transform:translate(-20px,-150px)}75%{transform:translate(180px,-30px)}100%{transform:translate(-120px,180px)}}
@keyframes orbit-three{0%{transform:translate(170px,100px)}25%{transform:translate(40px,210px)}50%{transform:translate(-180px,70px)}75%{transform:translate(-40px,-120px)}100%{transform:translate(170px,100px)}}
.radar-pulse{position:absolute;top:50%;left:50%;width:18px;height:18px;border-radius:50%;border:1px solid rgba(61,220,132,0.65);transform:translate(-50%,-50%) scale(0.3);opacity:0;pointer-events:none}
.radar-pulse.is-active{animation:pulse-ring 0.9s ease-out}
@keyframes pulse-ring{0%{opacity:0.8;transform:translate(-50%,-50%) scale(0.4)}100%{opacity:0;transform:translate(-50%,-50%) scale(3.1)}}
.radar-status{position:absolute;bottom:78px;left:50%;transform:translateX(-50%);display:flex;gap:12px;align-items:center;padding:8px 12px;border:1px solid rgba(61,220,132,0.12);background:rgba(8,11,17,0.78);font-family:var(--mono);font-size:9px;letter-spacing:1.8px;text-transform:uppercase;color:rgba(220,227,236,0.72);min-width:188px;justify-content:center}
.radar-status::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 6px rgba(61,220,132,0.4)}

.topo-bg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;opacity:0.4}
.topo-bg svg{width:100%;height:100%}
body::before{content:'';position:fixed;top:0;left:0;right:0;bottom:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.015) 3px,rgba(0,0,0,0.015) 6px);pointer-events:none;z-index:999}

.page-wrap{position:relative;z-index:1}
.container{max-width:900px;margin:0 auto;padding:0 28px}

nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:14px 28px;background:rgba(8,11,17,0.9);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.nav-logo{font-family:var(--mono);font-size:13px;font-weight:500;color:var(--green);letter-spacing:2px}
.nav-links{display:flex;gap:28px;list-style:none}
.nav-links a{font-family:var(--mono);font-size:11px;color:var(--text-dim);text-decoration:none;letter-spacing:1.5px;text-transform:uppercase;transition:color 0.3s}
.nav-links a:hover,.nav-links a:focus-visible,.nav-links a.is-active{color:var(--green)}

.status-bar{position:fixed;bottom:0;left:0;right:0;z-index:100;padding:8px 28px;background:rgba(8,11,17,0.92);backdrop-filter:blur(12px);border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;font-family:var(--mono);font-size:10px;color:var(--text-dim);letter-spacing:1.5px;text-transform:uppercase}
.status-dot{display:inline-block;width:6px;height:6px;background:var(--green);border-radius:50%;margin-right:8px;animation:pulse-dot 2s ease infinite;box-shadow:0 0 6px var(--green-glow)}
@keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:0.4}}

.hero{padding:160px 0 60px}
.hero-coord{font-family:var(--mono);font-size:11px;color:var(--text-dim);letter-spacing:3px;margin-bottom:8px}
.hero-ident{font-family:var(--mono);font-size:11px;color:var(--green);letter-spacing:2px;margin-bottom:20px}
.hero-ident .blink{animation:blink 1.2s step-end infinite}
h1{font-family:var(--sans);font-size:56px;font-weight:700;color:var(--text-bright);letter-spacing:-1px;line-height:1.1;margin-bottom:16px}
.hero-sub{font-family:var(--sans);font-size:18px;font-weight:300;color:var(--text-mid);max-width:560px;margin-bottom:28px}
.hero-actions{display:flex;flex-wrap:wrap;gap:14px;margin-top:28px}
.hero-button{display:inline-flex;align-items:center;justify-content:center;gap:10px;padding:12px 18px;border:1px solid var(--border);border-radius:4px;text-decoration:none;font-family:var(--mono);font-size:11px;letter-spacing:1.7px;text-transform:uppercase;transition:transform 0.25s ease,background 0.25s ease,border-color 0.25s ease,color 0.25s ease}
.hero-button:hover,.hero-button:focus-visible{transform:translateY(-2px);border-color:var(--green-mid)}
.hero-button-primary{background:var(--green-dim);color:var(--green)}
.hero-button-secondary{background:rgba(17,23,32,0.85);color:var(--text-bright)}
.hero-button-tertiary{background:transparent;color:var(--text-mid)}

.stats-strip{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px;margin:10px 0 26px}
.stat-card{position:relative;padding:18px 18px 16px;background:linear-gradient(180deg,rgba(17,23,32,0.96),rgba(11,16,24,0.92));border:1px solid var(--border);border-radius:4px;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:0;width:100%;height:2px;background:linear-gradient(90deg,var(--green),transparent);opacity:0.75}
.stat-value{font-family:var(--mono);font-size:30px;color:var(--text-bright);letter-spacing:-1px}
.stat-label{font-family:var(--mono);font-size:10px;color:var(--green);letter-spacing:2px;text-transform:uppercase;margin-top:6px}
.stat-note{font-size:13px;color:var(--text-mid);margin-top:8px;line-height:1.55}

section{padding:64px 0;scroll-margin-top:96px}
.section-marker{font-family:var(--mono);font-size:11px;color:var(--text-dim);letter-spacing:3px;text-transform:uppercase;margin-bottom:6px;display:flex;align-items:center;gap:10px}
.section-marker::before{content:'';width:8px;height:8px;border:1.5px solid var(--green);border-radius:50%;flex-shrink:0}
h2{font-family:var(--sans);font-size:32px;font-weight:600;color:var(--text-bright);margin-bottom:24px;letter-spacing:-0.5px}
.divider{width:40px;height:1px;background:var(--green);margin-bottom:36px;opacity:0.4;box-shadow:0 0 8px var(--green-faint)}
.about-text{font-size:17px;font-weight:300;color:var(--text-mid);max-width:620px;line-height:1.8}

.reveal{opacity:0;transform:translateY(28px);transition:opacity 0.7s ease,transform 0.7s ease}
.reveal.is-visible{opacity:1;transform:translateY(0)}
.reveal-stagger{transition-delay:var(--delay,0ms)}

.timeline{position:relative}
.timeline::before{content:'';position:absolute;left:0;top:8px;bottom:8px;width:1px;background:linear-gradient(to bottom,var(--green-mid),var(--border))}
.timeline-item{padding-left:28px;margin-bottom:36px;position:relative}
.timeline-item:last-child{margin-bottom:0}
.timeline-item::before{content:'';position:absolute;left:-4px;top:8px;width:9px;height:9px;background:var(--green);border-radius:50%;box-shadow:0 0 8px var(--green-glow)}
.timeline-item::after{content:'';position:absolute;left:-8px;top:4px;width:17px;height:17px;border:1px solid var(--green);border-radius:50%;opacity:0;animation:ping 3s ease-out infinite}
.timeline-item:nth-child(2)::after{animation-delay:1s}
.timeline-item:nth-child(3)::after{animation-delay:2s}
@keyframes ping{0%{transform:scale(1);opacity:0.5}100%{transform:scale(2.5);opacity:0}}
.timeline-header{display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:8px;margin-bottom:2px}
.timeline-title{font-family:var(--sans);font-size:18px;font-weight:600;color:var(--text-bright)}
.timeline-date{font-family:var(--mono);font-size:11px;color:var(--text-dim);letter-spacing:1px}
.timeline-company{font-family:var(--mono);font-size:13px;color:var(--green);margin-bottom:10px;font-weight:400;opacity:0.8}
.timeline-bullets{list-style:none;padding:0}
.timeline-bullets li{font-size:14px;font-weight:300;color:var(--text-mid);padding:3px 0 3px 18px;position:relative;line-height:1.6}
.timeline-bullets li::before{content:'';position:absolute;left:0;top:12px;width:6px;height:1px;background:var(--green);opacity:0.5}

.projects-grid{display:grid;gap:16px}
